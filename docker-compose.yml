version: '3.9'

services:
  whatsapp-feed:
    build: .
    container_name: whatsapp-feed
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_PATH: /app/data/messages.db
      SESSION_DIR: /app/session-data
    volumes:
      - ./data:/app/data
      - ./session-data:/app/session-data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3000/health', r => r.statusCode===200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
